<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Child Page</title>
    <style>
      body { font-family: sans-serif; }
      button { padding: 10px 14px; }
    </style>
  </head>
  <body>
    <h1>Child Page</h1>
    <button id="pendingBtn">Pending Data</button>
    <button id="nxtBtn">Next Study</button>


    <script>
      document.getElementById("pendingBtn").addEventListener("click", () => {
        window.parent.postMessage(
          {
            type: "CARDIOLOGY_VIEWER_EVENT",
            payload: {
              message: "Hello from the iframe",
              time: new Date().toISOString()
            }
          },
          "*"
        );
      });
      document.getElementById("nxtBtn").addEventListener("click", () => {
        window.parent.postMessage(
          {
            type: "CARDIOLOGY_VIEWER_EVENT",
            payload: {
              message: "Hello from the iframe",
              time: new Date().toISOString()
            }
          },
          "*"
        );
      });
    </script>
  </body>
</html>
